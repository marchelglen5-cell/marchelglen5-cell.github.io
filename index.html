<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jejak Pustaka</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
  url('https://images.unsplash.com/photo-1512820790803-83ca734da794');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  font-family: 'Poppins', sans-serif;
}

.navbar { z-index: 9999; }

.container {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 25px;
  color: white;
}

.card {
  border-radius: 20px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  height: 200px;
  object-fit: cover;
}

/* LOGIN SIMPLE */
#loginBox {
  background: white;
  color: black;
  border-radius: 10px;
  padding: 15px;
}

#errorMsg {
  display: none;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg shadow" style="background: linear-gradient(90deg, #141e30, #243b55);">
  <div class="container">
    <a class="navbar-brand text-white fw-bold">Jejak Pustaka</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">

        <li class="nav-item"><a class="nav-link text-white">Beranda</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#koleksi">Koleksi</a></li>

        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle text-white" data-bs-toggle="dropdown">Kategori</a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" onclick="filterKategori('all')">Semua</a></li>
            <li><a class="dropdown-item" onclick="filterKategori('pemrograman')">Pemrograman</a></li>
            <li><a class="dropdown-item" onclick="filterKategori('database')">Database</a></li>
          </ul>
        </li>

        <li class="nav-item"><a class="nav-link text-white" href="#event">Event</a></li>

        <!-- LOGIN -->
        <li class="nav-item">
          <a class="nav-link text-warning fw-bold" href="#" onclick="toggleLogin()">Login</a>
        </li>

      </ul>
    </div>
  </div>
</nav>

<!-- LOGIN BOX -->
<div id="loginBox" class="container mt-3" style="display:none; max-width:300px;">
  <h5 class="text-center">Login</h5>

  <input type="text" id="username" class="form-control mb-2" placeholder="Username">
  <input type="password" id="password" class="form-control mb-2" placeholder="Password">

  <div id="errorMsg" class="text-danger mb-2">
    Username atau password salah
  </div>

  <button class="btn btn-primary w-100" onclick="login()">Masuk</button>
</div>

<!-- Search -->
<div class="container mt-4">
  <input type="text" class="form-control" placeholder="Cari buku..." id="search">
</div>

<!-- Koleksi -->
<div class="container mt-5" id="koleksi">
  <h3 class="text-center">Buku Populer</h3>
  <div class="row" id="bookList"></div>
</div>

<script>
let semuaBuku = [];
let kategoriAktif = 'all';

fetch('data.json')
.then(res => res.json())
.then(data => {
  semuaBuku = data;
  tampilkanBuku();
});

function tampilkanBuku(){
  let list = document.getElementById('bookList');
  let search = document.getElementById('search').value.toLowerCase();
  list.innerHTML = '';

  semuaBuku.forEach(b => {
    let cocokSearch = b.judul.toLowerCase().includes(search);
    let cocokKategori = (kategoriAktif === 'all' || b.kategori === kategoriAktif);

    if(cocokSearch && cocokKategori){
      list.innerHTML += `
      <div class="col-md-3 mb-4">
        <div class="card">
          <img src="${b.cover}">
          <div class="card-body text-dark">
            <h5>${b.judul}</h5>
            <p>${b.penulis}</p>
          </div>
        </div>
      </div>`;
    }
  });
}

document.getElementById('search').addEventListener('keyup', tampilkanBuku);

function filterKategori(k){
  kategoriAktif = k;
  tampilkanBuku();
}

// LOGIN
function toggleLogin(){
  let box = document.getElementById('loginBox');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
}

function login(){
  let user = document.getElementById('username').value;
  let pass = document.getElementById('password').value;
  let error = document.getElementById('errorMsg');

  if(user === "admin" && pass === "123"){
    localStorage.setItem("login","true");
    error.style.display = "none";
    location.reload();
  } else {
    error.style.display = "block";
  }
}

function logout(){
  localStorage.removeItem("login");
  location.reload();
}

window.onload = function(){
  if(localStorage.getItem("login") === "true"){
    let nav = document.querySelector('.navbar-nav');

    nav.innerHTML += `
      <li class="nav-item">
        <a class="nav-link text-success">Admin</a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-danger" href="#" onclick="logout()">Logout</a>
      </li>
    `;
  }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
