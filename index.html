<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jejak Pustaka</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
  url('https://images.unsplash.com/photo-1512820790803-83ca734da794');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  font-family: 'Poppins', sans-serif;
}

/* Glass Effect */
.container {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 25px;
  color: white;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

/* Card */
.card {
  border: none;
  border-radius: 20px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px) scale(1.03);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.card img {
  height: 260px;
  object-fit: cover;
}

/* Animasi */
.book {
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from { opacity:0; transform:translateY(20px);}
  to { opacity:1; transform:translateY(0);}
}

h3 {
  text-align: center;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg shadow" 
     style="background: linear-gradient(90deg, #141e30, #243b55);">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center text-white" href="#">
      <img src="https://cdn-icons-png.flaticon.com/512/29/29302.png"
           width="40"
           class="me-2 rounded-circle bg-white p-1">
      <span style="font-weight:bold; font-size:20px;">
        Jejak Pustaka
      </span>
    </a>
  </div>
</nav>

<!-- Search -->
<div class="container mt-4">
  <input type="text" class="form-control" placeholder="Cari buku..." id="search">
</div>

<!-- Koleksi -->
<div class="container mt-5">
  <h3>Buku Populer</h3>

  <div class="row" id="bookList">

    <div class="col-md-3 book">
      <div class="card">
        <img src="https://covers.openlibrary.org/b/id/8231856-L.jpg">
        <div class="card-body">
          <h5>Clean Code</h5>
          <p>Robert C. Martin</p>
        </div>
      </div>
    </div>

    <div class="col-md-3 book">
      <div class="card">
        <img src="https://covers.openlibrary.org/b/id/240726-L.jpg">
        <div class="card-body">
          <h5>Database System Concepts</h5>
          <p>Abraham Silberschatz</p>
        </div>
      </div>
    </div>

    <div class="col-md-3 book">
      <div class="card">
        <img src="https://covers.openlibrary.org/b/id/8101356-L.jpg">
        <div class="card-body">
          <h5>You Don't Know JS</h5>
          <p>Kyle Simpson</p>
        </div>
      </div>
    </div>

    <div class="col-md-3 book">
      <div class="card">
        <img src="https://covers.openlibrary.org/b/id/10523338-L.jpg">
        <div class="card-body">
          <h5>Eloquent JavaScript</h5>
          <p>Marijn Haverbeke</p>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Tambah Buku -->
<div class="container mt-5">
  <h3>Tambah Buku</h3>
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-3">
        <form onsubmit="tambahBuku(event)">
          <input type="text" id="judul" class="form-control mb-2" placeholder="Judul Buku" required>
          <input type="text" id="penulis" class="form-control mb-2" placeholder="Penulis" required>
          <input type="text" id="cover" class="form-control mb-2" placeholder="URL Cover Buku" required>
          <button class="btn btn-success w-100">Tambah Buku</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="detailModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-dark">
      <div class="modal-body text-center">
        <img id="modalImg" class="img-fluid mb-3" style="height:250px;">
        <h4 id="modalTitle"></h4>
        <p id="modalAuthor"></p>
      </div>
    </div>
  </div>
</div>

<script>
// Search realtime
document.getElementById('search').addEventListener('keyup', function(){
  let input = this.value.toLowerCase();
  let books = document.querySelectorAll('.book');

  books.forEach(b => {
    let title = b.innerText.toLowerCase();
    b.style.display = title.includes(input) ? 'block' : 'none';
  });
});

// Tambah buku
function tambahBuku(e){
  e.preventDefault();

  let judul = document.getElementById('judul').value;
  let penulis = document.getElementById('penulis').value;
  let cover = document.getElementById('cover').value;

  let bukuBaru = `
    <div class="col-md-3 book">
      <div class="card">
        <img src="${cover}">
        <div class="card-body">
          <h5>${judul}</h5>
          <p>${penulis}</p>
        </div>
      </div>
    </div>
  `;

  document.getElementById('bookList').innerHTML += bukuBaru;

  loadClickEvent(); // biar bisa diklik juga
}

// Modal detail
function loadClickEvent(){
  document.querySelectorAll('.book').forEach(book => {
    book.onclick = function(){
      let img = this.querySelector('img').src;
      let title = this.querySelector('h5').innerText;
      let author = this.querySelector('p').innerText;

      document.getElementById('modalImg').src = img;
      document.getElementById('modalTitle').innerText = title;
      document.getElementById('modalAuthor').innerText = author;

      new bootstrap.Modal(document.getElementById('detailModal')).show();
    }
  });
}

loadClickEvent();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
