<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jejak Pustaka</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>
#errorMsg {
  font-size: 14px;
  display: none;
}
</style>

</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg shadow" style="background: linear-gradient(90deg, #141e30, #243b55);">
  <div class="container">
    <a class="navbar-brand text-white fw-bold" href="#">Jejak Pustaka</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">

        <li class="nav-item"><a class="nav-link text-white" href="#">Beranda</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#koleksi">Daftar Koleksi</a></li>

        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle text-white" data-bs-toggle="dropdown">Kategori</a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" onclick="filterKategori('all')">Semua</a></li>
            <li><a class="dropdown-item" onclick="filterKategori('pemrograman')">Pemrograman</a></li>
            <li><a class="dropdown-item" onclick="filterKategori('database')">Database</a></li>
          </ul>
        </li>

        <li class="nav-item"><a class="nav-link text-white" href="#event">Event</a></li>

        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle text-white" data-bs-toggle="dropdown">Lainnya</a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="anggota.html">Anggota</a></li>
            <li><a class="dropdown-item" href="#">Tentang Kami</a></li>
            <li><a class="dropdown-item" href="#">Kontak</a></li>
          </ul>
        </li>

        <!-- LOGIN -->
        <li class="nav-item">
          <a class="nav-link text-warning fw-bold" href="#" onclick="tampilLogin()">Login</a>
        </li>

      </ul>
    </div>
  </div>
</nav>

<!-- LOGIN FORM -->
<div id="loginBox" class="container mt-4" style="display:none; max-width:400px;">
  <h4 class="text-center">Login Admin</h4>

  <input type="text" id="username" class="form-control mb-2" placeholder="Username">
  <input type="password" id="password" class="form-control mb-2" placeholder="Password">

  <!-- ERROR -->
  <div id="errorMsg" class="text-danger mb-2">
    Password atau username salah!
  </div>

  <button class="btn btn-success w-100" onclick="login()">Login</button>
</div>

<!-- Search -->
<div class="container mt-4">
  <input type="text" class="form-control" placeholder="Cari buku..." id="search">
</div>

<!-- Koleksi -->
<div class="container mt-5" id="koleksi">
  <h3 class="text-center">Buku Populer</h3>
  <div class="row" id="bookList">
    <p class="text-center">Loading...</p>
  </div>
</div>

<!-- Event -->
<div class="container mt-5" id="event">
  <h3 class="text-center">Event</h3>
  <div class="row">
    <div class="col-md-4">
      <div class="card p-3 text-center">
        <img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f" class="img-fluid rounded mb-3">
        <h5>Festival Literasi Nasional 2026</h5>
      </div>
    </div>
  </div>
</div>

<script>
let semuaBuku = [];
let kategoriAktif = 'all';

// FETCH DATA
fetch('data.json')
  .then(res => res.json())
  .then(data => {
    semuaBuku = data;
    tampilkanBuku();
  });

// TAMPIL BUKU
function tampilkanBuku() {
  let list = document.getElementById('bookList');
  let search = document.getElementById('search').value.toLowerCase();

  list.innerHTML = '';

  semuaBuku.forEach(b => {
    let cocokSearch = b.judul.toLowerCase().includes(search);
    let cocokKategori = (kategoriAktif === 'all' || b.kategori === kategoriAktif);

    if (cocokSearch && cocokKategori) {
      list.innerHTML += `
        <div class="col-md-3 mb-4">
          <div class="card">
            <img src="${b.cover}">
            <div class="card-body text-dark">
              <h5>${b.judul}</h5>
              <p>${b.penulis}</p>
            </div>
          </div>
        </div>
      `;
    }
  });
}

document.getElementById('search').addEventListener('keyup', tampilkanBuku);

function filterKategori(kategori){
  kategoriAktif = kategori;
  tampilkanBuku();
}

// LOGIN UI
function tampilLogin(){
  let box = document.getElementById('loginBox');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
}

// LOGIN FUNCTION
function login(){
  let user = document.getElementById('username').value;
  let pass = document.getElementById('password').value;
  let error = document.getElementById('errorMsg');

  if(user === "admin" && pass === "123"){
    localStorage.setItem("login", "true");
    error.style.display = "none";
    alert("Login berhasil!");
    location.reload();
  } else {
    error.style.display = "block";
  }
}

// LOGOUT
function logout(){
  localStorage.removeItem("login");
  location.reload();
}

// CEK LOGIN
window.onload = function(){
  if(localStorage.getItem("login") === "true"){
    let nav = document.querySelector('.navbar-nav');

    nav.innerHTML += `
      <li class="nav-item">
        <a class="nav-link text-success fw-bold">Admin</a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-danger" href="#" onclick="logout()">Logout</a>
      </li>
    `;
  }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
