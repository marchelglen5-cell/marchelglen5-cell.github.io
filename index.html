<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beranda Glen Marchel</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    padding-left: 60px;
    gap: 40px;

    background-image: url("https://images.wallpaperscraft.com/image/single/library_books_shelves_192916_1600x900.jpg");
    background-size: cover;
    background-position: center;
}

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jejak Pustaka</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background-color: #f4f6f9; }
.card:hover { transform: scale(1.05); transition: 0.3s; }
.category-box { cursor: pointer; padding: 20px; border-radius: 10px; background: white; text-align: center; }
.category-box:hover { background: #1abc9c; color: white; }
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="#">
      <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAOEAAADhCAIAAACx0UUtAAAQAElEQVR4AeydCXhU5bnHz5zJAgGCbIoS9kXEK4osithbDSBoZVG0" alt="logo" width="30" height="30" class="me-2">
      <span>Jejak Pustaka</span>
    </a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#">Beranda</a></li>
        <li class="nav-item"><a class="nav-link" href="#kategori">Kategori</a></li>
        <li class="nav-item"><a class="nav-link" href="#koleksi">Koleksi</a></li>
        <li class="nav-item"><a class="nav-link" href="#login">Login</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Hero -->
<div class="container mt-4 text-center">
  <h2>Pilih Subjek Buku</h2>
  <div class="row mt-3" id="kategori">
    <div class="col-md-2"><div class="category-box">Kesusastraan</div></div>
    <div class="col-md-2"><div class="category-box">Sosial</div></div>
    <div class="col-md-2"><div class="category-box">Sains</div></div>
    <div class="col-md-2"><div class="category-box">Teknologi</div></div>
    <div class="col-md-2"><div class="category-box">Olahraga</div></div>
  </div>

  <!-- Search -->
  <div class="input-group mt-4">
    <input type="text" class="form-control" placeholder="Cari buku..." id="search">
    <button class="btn btn-success" onclick="searchBook()">Cari</button>
  </div>
</div>

<!-- Koleksi -->
<div class="container mt-5" id="koleksi">
  <h3>Buku Populer</h3>

  <!-- Filter Tabs -->
  <ul class="nav nav-pills mb-3">
    <li class="nav-item"><button class="nav-link active" onclick="filter('all')">Semua</button></li>
    <li class="nav-item"><button class="nav-link" onclick="filter('pemrograman')">Pemrograman</button></li>
    <li class="nav-item"><button class="nav-link" onclick="filter('database')">Database</button></li>
  </ul>

  <div class="row" id="bookList">

    <div class="col-md-3 book" data-kategori="pemrograman">
      <div class="card">
        <div class="card-body">
          <h5>Pemrograman Web</h5>
          <p>Andi</p>
        </div>
      </div>
    </div>

    <div class="col-md-3 book" data-kategori="database">
      <div class="card">
        <div class="card-body">
          <h5>Basis Data</h5>
          <p>Budi</p>
        </div>
      </div>
    </div>

    <div class="col-md-3 book" data-kategori="pemrograman">
      <div class="card">
        <div class="card-body">
          <h5>Algoritma</h5>
          <p>Citra</p>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Login -->
<div class="container mt-5" id="login">
  <h3>Login Admin</h3>
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card p-3">
        <form onsubmit="login(event)">
          <input type="text" class="form-control mb-2" placeholder="Username" id="username" required>
          <input type="password" class="form-control mb-2" placeholder="Password" id="password" required>
          <button class="btn btn-primary w-100">Login</button>
        </form>
        <p id="msg" class="text-danger"></p>
      </div>
    </div>
  </div>
</div>

<footer class="bg-dark text-white text-center p-3 mt-5">
  <p>&copy; 2026 Jejak Pustaka</p>
</footer>

<script>
function login(e){
 e.preventDefault();
 let u=document.getElementById('username').value;
 let p=document.getElementById('password').value;
 if(u==='admin' && p==='123') alert('Login berhasil');
 else document.getElementById('msg').innerText='Salah';
}

function filter(kategori){
 let books=document.querySelectorAll('.book');
 books.forEach(b=>{
  if(kategori==='all' || b.dataset.kategori===kategori) b.style.display='block';
  else b.style.display='none';
 });
}

function searchBook(){
 let input=document.getElementById('search').value.toLowerCase();
 let books=document.querySelectorAll('.book');
 books.forEach(b=>{
  let title=b.innerText.toLowerCase();
  b.style.display=title.includes(input)?'block':'none';
 });
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
