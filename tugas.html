<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tugas Belajar PHP</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background-color: #f5f7fa;
}

.box {
  background: #4e73df;
  color: white;
  padding: 20px;
  border-radius: 10px;
  max-width: 600px;
  margin: auto;
}

/* BIAR BISA SCROLL */
.box {
  max-height: 500px;
  overflow-y: scroll;
}

.item {
  margin-bottom: 5px;
}
</style>

</head>

<body>

<div class="container mt-5">
  <h3 class="text-center mb-4">Tugas Belajar PHP</h3>

  <div class="box" id="listTugas"></div>

  <!-- Tombol kembali -->

  <div class="text-center mt-3">
    <a href="index.html" class="btn btn-dark">Kembali</a>
  </div>
</div>

<script>
let container = document.getElementById("listTugas");

let html = "";

// LOOP 1 SAMPAI 1000
for(let i = 1; i <= 1000; i++){
  html += `<div class="item">${i}. Ini adalah hari ke-${i} belajar PHP</div>`;
}

container.innerHTML = html;
</script>

</body>
</html>
